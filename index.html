<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
<title>Controle Financeiro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#101214;
    --bg-alt:#17191C;
    --bg-card:#1C1F23;
    --bg-card-2:#22262B;
    --line: rgba(230,222,200,0.14);
    --line-strong: rgba(230,222,200,0.24);
    --ink:#F1EEE6;
    --ink-soft:#9B9C96;
    --muted:#6D6E68;
    --gold:#E3A93E;
    --green:#3FC684;
    --green-soft: rgba(63,198,132,0.14);
    --rust:#F16A52;
    --rust-soft: rgba(241,106,82,0.14);
    --amber:#F0A93B;
    --amber-soft: rgba(240,169,59,0.14);
    --blue:#4FA7E8;
    --blue-soft: rgba(79,167,232,0.14);
    --shadow: 0 12px 28px -14px rgba(0,0,0,0.6);
  }
  *{box-sizing:border-box;}
  @media (prefers-reduced-motion: reduce){ *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;} }
  html,body{ margin:0; padding:0; height:100%; background:var(--bg); color:var(--ink); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; }
  #app{ max-width:480px; margin:0 auto; min-height:100vh; background:var(--bg); position:relative; padding-bottom:96px; }
  h1,h2,h3{font-family:'Fraunces',serif; margin:0; color:var(--ink); font-weight:600;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  button{font-family:inherit; cursor:pointer; color:inherit;}
  button:focus-visible, input:focus-visible, select:focus-visible, .chip:focus-visible{ outline:2px solid var(--gold); outline-offset:2px; }

  .topbar{ padding:22px 20px 4px; display:flex; align-items:baseline; gap:9px; flex-wrap:wrap; }
  .topbar h1{font-size:21px; letter-spacing:-0.01em;}
  .topbar .stamp{ font-size:10px; text-transform:uppercase; letter-spacing:0.12em; color:var(--gold); border:1px solid var(--gold); border-radius:20px; padding:2px 8px; font-family:'IBM Plex Mono',monospace; }
  .subtitle{padding:0 20px 16px; color:var(--ink-soft); font-size:13px; text-transform:capitalize;}

  .month-nav{ display:flex; align-items:center; justify-content:space-between; margin:0 20px 16px; padding:10px 14px; background:var(--bg-card); border-radius:14px; border:1px solid var(--line); }
  .month-nav button{ background:none; border:none; color:var(--gold); font-size:18px; padding:4px 10px; border-radius:8px; }
  .month-nav button:hover{background:var(--bg-card-2);}
  .month-label{font-family:'Fraunces',serif; font-weight:600; font-size:14.5px; text-transform:capitalize;}

  .summary{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:0 20px 20px; }
  .summary .balance{grid-column:1/-1;}
  .card-stat{ border-radius:16px; padding:14px 16px; background:var(--bg-card); border:1px solid var(--line); box-shadow:var(--shadow); }
  .card-stat .lbl{font-size:11px; text-transform:uppercase; letter-spacing:0.08em; color:var(--ink-soft);}
  .card-stat .val{font-family:'IBM Plex Mono',monospace; font-size:19px; font-weight:600; margin-top:4px;}
  .card-stat.income .val{color:var(--green);}
  .card-stat.expense .val{color:var(--rust);}
  .card-stat.balance{background:linear-gradient(135deg,#1B2A22,#182320); border-color:rgba(63,198,132,0.3);}
  .card-stat.balance .lbl{color:#9FCBB0;}
  .card-stat.balance .val{color:#fff; font-size:26px;}

  .section{margin:24px 20px 0;}
  .section-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;}
  .section-head h2{font-size:16px;}
  .section-head .link{font-size:12px; color:var(--gold); background:none; border:none; font-weight:600;}

  /* 50/30/20 rule */
  .rule-row{background:var(--bg-card); border:1px solid var(--line); border-radius:16px; padding:14px 16px; margin-bottom:10px; box-shadow:var(--shadow);}
  .rule-top{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px;}
  .rule-top .name{font-weight:600; font-size:13.5px;}
  .rule-top .pct{font-family:'IBM Plex Mono',monospace; font-weight:700; font-size:14px;}
  .rule-track{height:8px; background:var(--bg-card-2); border-radius:6px; overflow:hidden; margin-bottom:8px;}
  .rule-fill{height:100%; border-radius:6px;}
  .rule-nums{display:flex; justify-content:space-between; font-size:11.5px; color:var(--ink-soft); font-family:'IBM Plex Mono',monospace;}
  .rule-row.fixa .pct, .rule-row.fixa .rule-fill{color:var(--rust); background:var(--rust);}
  .rule-row.variavel .pct, .rule-row.variavel .rule-fill{color:var(--amber); background:var(--amber);}
  .rule-row.reserva .pct, .rule-row.reserva .rule-fill{color:var(--green); background:var(--green);}

  .resumo-grid{display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px;}
  .resumo-card{background:var(--bg-card); border:1px solid var(--line); border-radius:14px; padding:12px 10px; text-align:left;}
  .resumo-card .lbl{font-size:10.5px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.04em;}
  .resumo-card .pct{font-family:'Fraunces',serif; font-weight:700; font-size:19px; margin:3px 0 2px;}
  .resumo-card .val{font-size:11px; color:var(--ink-soft); font-family:'IBM Plex Mono',monospace;}
  .resumo-card.fixa .pct{color:var(--rust);}
  .resumo-card.variavel .pct{color:var(--amber);}
  .resumo-card.reserva .pct{color:var(--green);}

  /* Year bar chart */
  .yearbars-box{background:var(--bg-card); border:1px solid var(--line); border-radius:16px; padding:16px 12px 10px; box-shadow:var(--shadow);}
  .yearbars{display:flex; align-items:flex-end; gap:5px; height:120px;}
  .yearbar-col{flex:1; display:flex; flex-direction:column; align-items:center; height:100%; justify-content:flex-end;}
  .yearbar-pair{display:flex; align-items:flex-end; gap:2px; height:100%; width:100%; justify-content:center;}
  .yearbar-pair .bar{width:6px; min-height:2px; border-radius:3px 3px 0 0;}
  .yearbar-pair .bar.income{background:var(--green);}
  .yearbar-pair .bar.expense{background:var(--rust);}
  .yearbar-label{font-size:9px; color:var(--muted); margin-top:6px; font-family:'IBM Plex Mono',monospace;}
  .yearbars-legend{display:flex; gap:16px; justify-content:center; margin-top:10px; font-size:11px; color:var(--ink-soft);}
  .yearbars-legend span{display:flex; align-items:center; gap:5px;}
  .dotmini{width:8px; height:8px; border-radius:2px; display:inline-block;}

  /* Donut */
  .breakdown{ display:flex; gap:18px; align-items:center; background:var(--bg-card); border:1px solid var(--line); border-radius:16px; padding:16px; box-shadow:var(--shadow); }
  .donut{ width:92px; height:92px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
  .donut-hole{ width:56px; height:56px; border-radius:50%; background:var(--bg-card); display:flex; align-items:center; justify-content:center; flex-direction:column; }
  .donut-hole span{font-size:9px; color:var(--ink-soft); text-transform:uppercase;}
  .donut-hole strong{font-family:'IBM Plex Mono',monospace; font-size:12px;}
  .legend{flex:1; display:flex; flex-direction:column; gap:6px;}
  .legend-row{display:flex; align-items:center; gap:8px; font-size:12px;}
  .legend-dot{width:9px; height:9px; border-radius:3px; flex-shrink:0;}
  .legend-row .name{flex:1; color:var(--ink-soft);}
  .legend-row .pct{font-family:'IBM Plex Mono',monospace; font-weight:600;}

  /* Receipt list */
  .receipt{ background:var(--bg-card); border:1px solid var(--line); border-radius:16px; box-shadow:var(--shadow); overflow:hidden; }
  .day-group{padding:6px 16px;}
  .day-label{ font-size:10px; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); padding:10px 0 4px; font-family:'IBM Plex Mono',monospace; }
  .tx-row{ display:flex; align-items:center; gap:10px; padding:10px 0; border-top:1px dashed var(--line); }
  .day-group .tx-row:first-of-type{border-top:none;}
  .tx-icon{ width:34px; height:34px; border-radius:10px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:16px; }
  .tx-info{flex:1; min-width:0;}
  .tx-info .cat{font-size:13.5px; font-weight:600;}
  .tx-info .tag{font-size:10px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.04em;}
  .tx-info .note{font-size:11.5px; color:var(--ink-soft); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .tx-val{font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:14px; flex-shrink:0;}
  .tx-val.income{color:var(--green);}
  .tx-val.expense{color:var(--rust);}
  .tx-actions{display:flex; align-items:center; gap:2px; flex-shrink:0;}
  .tx-edit{background:none; border:none; color:var(--muted); font-size:14px; padding:5px;}
  .tx-edit:hover{color:var(--gold);}
  .tx-del{background:none; border:none; color:var(--muted); font-size:16px; padding:5px;}
  .tx-del:hover{color:var(--rust);}

  .empty{ text-align:center; padding:34px 20px; color:var(--ink-soft); font-size:13px; background:var(--bg-card); border:1px dashed var(--line); border-radius:16px; }
  .empty strong{display:block; color:var(--ink); font-family:'Fraunces',serif; font-size:16px; margin-bottom:4px;}

  .cardlist{display:flex; flex-direction:column; gap:10px;}
  .bankcard{ border-radius:16px; padding:16px; color:#fff; position:relative; overflow:hidden; box-shadow:var(--shadow); min-height:100px; display:flex; flex-direction:column; justify-content:space-between; }
  .bankcard::after{ content:''; position:absolute; right:-30px; top:-30px; width:120px; height:120px; border-radius:50%; background:rgba(255,255,255,0.12); }
  .bankcard .name{font-family:'Fraunces',serif; font-size:16px; font-weight:600;}
  .bankcard .meta{font-size:11px; opacity:0.85; font-family:'IBM Plex Mono',monospace;}
  .bankcard .del{position:absolute; top:10px; right:12px; background:none; border:none; color:rgba(255,255,255,0.8); font-size:15px;}

  .goal-card{ background:var(--bg-card); border:1px solid var(--line); border-radius:16px; padding:16px; box-shadow:var(--shadow); margin-bottom:10px; }
  .goal-top{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px;}
  .goal-top .name{font-family:'Fraunces',serif; font-weight:600; font-size:15px;}
  .goal-top .del{background:none;border:none;color:var(--ink-soft);font-size:14px;}
  .goal-nums{display:flex; justify-content:space-between; font-size:12px; font-family:'IBM Plex Mono',monospace; color:var(--ink-soft); margin-bottom:6px;}
  .goal-bar-track{height:9px; background:var(--bg-card-2); border-radius:6px; overflow:hidden;}
  .goal-bar-fill{height:100%; background:linear-gradient(90deg, var(--green), var(--gold)); border-radius:6px;}
  .goal-add{margin-top:10px; display:flex; gap:8px;}
  .goal-add input{flex:1;}
  .goal-add button{ background:var(--bg-card-2); border:1px solid var(--line-strong); color:var(--ink); border-radius:10px; padding:0 14px; font-size:12px; font-weight:600; }

  /* Categorias tab */
  .newcat-box{background:var(--bg-card); border:1px solid var(--line); border-radius:16px; padding:16px; box-shadow:var(--shadow); margin-bottom:18px;}
  .cat-subhead{font-size:11px; text-transform:uppercase; letter-spacing:0.08em; color:var(--ink-soft); margin:16px 2px 8px;}
  .catlist{display:flex; flex-direction:column; gap:2px;}
  .catrow{display:flex; align-items:center; gap:10px; background:var(--bg-card); border:1px solid var(--line); border-radius:12px; padding:11px 14px; margin-bottom:8px;}
  .catrow .dot{width:26px; height:26px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0;}
  .catrow .cname{flex:1; font-size:13.5px; font-weight:600;}
  .catrow .ctype{font-size:10px; color:var(--ink-soft); text-transform:uppercase;}
  .catrow .cat-amount{font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:13px; flex-shrink:0;}
  .catrow .cat-amount.expense{color:var(--rust);}
  .catrow .cat-amount.income{color:var(--green);}
  .catrow .del{background:none; border:none; color:var(--muted); font-size:14px; padding:3px; flex-shrink:0;}
  .catrow .del:hover{color:var(--rust);}

  .bottomnav{ position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; background:var(--bg-alt); border-top:1px solid var(--line); display:flex; padding:8px 4px calc(8px + env(safe-area-inset-bottom)); z-index:20; }
  .navbtn{ flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; background:none; border:none; color:var(--ink-soft); font-size:9.5px; font-weight:600; padding:6px 0; border-radius:10px; }
  .navbtn .ic{font-size:18px;}
  .navbtn.active{color:var(--gold);}

  .fab{ position:fixed; bottom:78px; right:calc(50% - 240px + 20px); width:56px; height:56px; border-radius:50%; background:var(--gold); color:#20180A; border:none; font-size:26px; box-shadow:0 10px 24px -8px rgba(227,169,62,0.55); display:flex; align-items:center; justify-content:center; z-index:21; font-weight:700; }
  @media (min-width:520px){ .fab{ right:calc(50% - 200px); } }

  .overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:30; display:flex; align-items:flex-end; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.2s ease; }
  .overlay.open{opacity:1; pointer-events:auto;}

  .confirm-box{ background:var(--bg-alt); border:1px solid var(--line-strong); border-radius:16px; padding:20px; max-width:300px; margin:0 20px; box-shadow:var(--shadow); }
  .confirm-box p{ font-size:14px; color:var(--ink); margin:0 0 18px; line-height:1.5; }
  .confirm-actions{display:flex; gap:10px;}
  .confirm-actions button{flex:1; padding:12px 0; border-radius:12px; font-weight:600; font-size:13.5px; border:none;}
  .confirm-cancel{background:var(--bg-card-2); color:var(--ink); border:1px solid var(--line-strong) !important;}
  .confirm-ok{background:var(--rust); color:#2A0E08;}

  .toast{ position:fixed; bottom:96px; left:50%; transform:translateX(-50%); max-width:88%; background:var(--bg-card-2); color:var(--ink); padding:11px 18px; border-radius:12px; font-size:12.5px; border:1px solid var(--line-strong); z-index:50; box-shadow:var(--shadow); text-align:center; }
  .sheet{ width:100%; max-width:480px; background:var(--bg-alt); border-radius:22px 22px 0 0; padding:18px 20px calc(20px + env(safe-area-inset-bottom)); transform:translateY(100%); transition:transform 0.25s ease; max-height:88vh; overflow-y:auto; border-top:1px solid var(--line-strong); }
  .overlay.open .sheet{transform:translateY(0);}
  .sheet-handle{width:36px; height:4px; background:var(--line-strong); border-radius:4px; margin:0 auto 14px;}
  .sheet h3{font-size:18px; margin-bottom:16px;}

  .segmented{display:flex; background:var(--bg-card); border-radius:12px; padding:4px; margin-bottom:16px; border:1px solid var(--line);}
  .segmented button{ flex:1; border:none; background:none; padding:10px 0; border-radius:9px; font-weight:600; font-size:13px; color:var(--ink-soft); }
  .segmented button.active.income{background:var(--green); color:#0E2018;}
  .segmented button.active.expense{background:var(--rust); color:#2A0E08;}
  .segmented button.active.fixa{background:var(--rust); color:#2A0E08;}
  .segmented button.active.variavel{background:var(--amber); color:#2A1A05;}
  .segmented button.active.reserva{background:var(--green); color:#0E2018;}

  .field{margin-bottom:14px;}
  .field label{display:block; font-size:11px; text-transform:uppercase; letter-spacing:0.06em; color:var(--ink-soft); margin-bottom:6px; font-weight:600;}
  .valinput-wrap{display:flex; align-items:center; background:var(--bg-card); border:1.5px solid var(--line-strong); border-radius:12px; padding:10px 14px;}
  .valinput-wrap span{font-family:'IBM Plex Mono',monospace; font-weight:600; color:var(--ink-soft); margin-right:6px;}
  .valinput-wrap input{ border:none; outline:none; font-family:'IBM Plex Mono',monospace; font-size:22px; font-weight:600; width:100%; background:none; color:var(--ink); }
  input[type=text], input[type=date], select{ width:100%; padding:11px 13px; border-radius:12px; border:1.5px solid var(--line-strong); font-size:14px; background:var(--bg-card); color:var(--ink); font-family:'Inter',sans-serif; }
  select option{background:var(--bg-card);}
  .chipgrid{display:flex; flex-wrap:wrap; gap:8px;}
  .chip{ border:1.5px solid var(--line-strong); background:var(--bg-card); border-radius:20px; padding:8px 13px; font-size:13px; display:flex; align-items:center; gap:6px; color:var(--ink-soft); font-weight:500; }
  .chip.selected{border-color:var(--gold); background:rgba(227,169,62,0.15); color:var(--gold); font-weight:600;}
  .toggle-row{display:flex; align-items:center; justify-content:space-between; padding:4px 0;}
  .toggle-row .t-label{font-size:13.5px; font-weight:500;}
  .switch{width:42px; height:24px; border-radius:20px; background:var(--bg-card-2); position:relative; border:1px solid var(--line-strong); flex-shrink:0;}
  .switch.on{background:var(--green); border-color:var(--green);}
  .switch::after{content:''; position:absolute; width:16px; height:16px; border-radius:50%; background:#fff; top:3px; left:3px; transition:left 0.15s ease;}
  .switch.on::after{left:20px;}
  .save-btn{ width:100%; padding:15px; background:var(--gold); color:#20180A; border:none; border-radius:14px; font-size:15px; font-weight:700; margin-top:6px; font-family:'Fraunces',serif; }
  .save-btn:active{transform:scale(0.98);}
  .cancel-link{display:block; text-align:center; background:none; border:none; color:var(--ink-soft); padding:12px; font-size:13px; width:100%;}
</style>
</head>
<body>
<div id="app"><div class="empty" style="margin:40px 20px;"><strong>Abrindo seu controle…</strong>carregando seus lançamentos</div></div>

<script>
const MESES = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
const DIAS_SEMANA = ['dom','seg','ter','qua','qui','sex','sáb'];
const ICONS = ['🍽️','🚗','🏠','⚕️','🎬','🛍️','📚','💳','🔖','💼','💻','📈','💰','🎮','✈️','🐾','👶','🎁','⚡','📱'];
const CAT_COLORS = ['#F16A52','#E3A93E','#3FC684','#4FA7E8','#B07AE0','#E8608F','#4FCFC0','#8A8272'];

const DEFAULT_CATEGORIES = [
  {id:'c_alimentacao', name:'Alimentação', color:'#F16A52', icon:'🍽️', type:'expense'},
  {id:'c_transporte', name:'Transporte', color:'#E3A93E', icon:'🚗', type:'expense'},
  {id:'c_moradia', name:'Moradia', color:'#8A8272', icon:'🏠', type:'expense'},
  {id:'c_saude', name:'Saúde', color:'#E8608F', icon:'⚕️', type:'expense'},
  {id:'c_lazer', name:'Lazer', color:'#4FA7E8', icon:'🎬', type:'expense'},
  {id:'c_compras', name:'Compras', color:'#B07AE0', icon:'🛍️', type:'expense'},
  {id:'c_educacao', name:'Educação', color:'#4FCFC0', icon:'📚', type:'expense'},
  {id:'c_fatura', name:'Fatura do cartão', color:'#6D7C8C', icon:'💳', type:'expense'},
  {id:'c_salario', name:'Salário', color:'#3FC684', icon:'💼', type:'income'},
  {id:'c_freela', name:'Freelance', color:'#3FC684', icon:'💻', type:'income'},
  {id:'c_investimentos', name:'Investimentos', color:'#3FC684', icon:'📈', type:'income'},
];

const state = {
  transactions: [], cards: [], goals: [], recurring: [], categories: [],
  tab: 'dashboard', refDate: new Date(), refYear: new Date().getFullYear(), viewMode: 'month',
  form: { type:'expense', value:'', categoryId:null, destino:'fixa', date: todayISO(), cardId:'', recurring:false, recurringMonths:'', note:'' },
  sheetOpen: false, sheetMode:'tx', loaded:false, editingTxId:null,
  confirmDialog: null, toast: null, actionSheet: null,
};

function todayISO(){ const d=new Date(); return d.toISOString().slice(0,10); }
function fmtMoney(v){ return (v<0?'-':'') + new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(Math.abs(v||0)); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function escapeHtml(s){ const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

let toastTimer = null;
function showToast(msg){
  state.toast = msg; render();
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ state.toast=null; render(); }, 2600);
}
function askConfirm(message, onConfirm){ state.confirmDialog = { message, onConfirm }; render(); }
function closeConfirm(){ state.confirmDialog = null; render(); }
async function confirmYes(){
  const cb = state.confirmDialog && state.confirmDialog.onConfirm;
  state.confirmDialog = null;
  if(cb) await cb();
  render();
}
function renderConfirmDialog(){
  if(!state.confirmDialog) return '';
  return `<div class="overlay open" style="align-items:center;" onclick="closeConfirm()">
    <div class="confirm-box" onclick="event.stopPropagation()">
      <p>${escapeHtml(state.confirmDialog.message)}</p>
      <div class="confirm-actions">
        <button class="confirm-cancel" onclick="closeConfirm()">Cancelar</button>
        <button class="confirm-ok" onclick="confirmYes()">Excluir</button>

const STORAGE_PREFIX = 'controle-financeiro:';
async function loadKey(key, fallback){
  try{
    const raw = localStorage.getItem(STORAGE_PREFIX+key);
    return raw ? JSON.parse(raw) : fallback;
  } catch(e){ return fallback; }
}
async function saveKey(key, val){
  try{
    localStorage.setItem(STORAGE_PREFIX+key, JSON.stringify(val));
  } catch(e){ console.error('Falha ao salvar', key, e); }
}

async function init(){
  try{
    const [tx, cards, goals, rec, cats] = await Promise.all([
      loadKey('transactions', []), loadKey('cards', []), loadKey('goals', []),
      loadKey('recurring', []), loadKey('categories', null),
    ]);
    state.transactions = tx; state.cards = cards; state.goals = goals; state.recurring = rec;
    if(cats === null){ state.categories = DEFAULT_CATEGORIES.slice(); await saveKey('categories', state.categories); }
    else state.categories = cats;
    await generateRecurringForCurrentMonth();
  } catch(e){
    console.error('Falha ao iniciar', e);
    if(!state.categories.length) state.categories = DEFAULT_CATEGORIES.slice();
  } finally{
    state.loaded = true;
    render();
  }
}

function ymToNum(ym){ const [y,m] = ym.split('-').map(Number); return y*12+m; }
function ymOfDate(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }

function ensureRecurringGenerated(ym){
  let changed = false;
  const [y,m] = ym.split('-').map(Number);
  state.recurring.forEach(r=>{
    if(!r.active) return;
    if(r.startYm && ymToNum(ym) < ymToNum(r.startYm)) return;
    if(r.totalMonths && r.startYm){
      const elapsed = ymToNum(ym) - ymToNum(r.startYm) + 1;
      if(elapsed > r.totalMonths) return;
    }
    if(r.skippedYms && r.skippedYms.includes(ym)) return;
    const already = state.transactions.some(t=>t.recurringId===r.id && t.date.slice(0,7)===ym);
    if(!already){
      const lastDay = new Date(y, m, 0).getDate();
      const day = Math.min(r.day, lastDay);
      const date = ym+'-'+String(day).padStart(2,'0');
      state.transactions.push({ id:uid(), type:r.type, value:r.value, categoryId:r.categoryId, destino:r.destino, note:r.note||'', date, cardId:r.cardId||'', recurringId:r.id });
      changed = true;
    }
  });
  if(changed) saveKey('transactions', state.transactions);
  return changed;
}

async function generateRecurringForCurrentMonth(){
  const now = new Date();
  const ym = ymOfDate(now);
  let changed = false;
  state.recurring.forEach(r=>{
    if(!r.active) return;
    if(r.totalMonths && r.startYm){
      const elapsed = ymToNum(ym) - ymToNum(r.startYm) + 1;
      if(elapsed > r.totalMonths){ r.active = false; changed = true; }
    }
  });
  if(changed) await saveKey('recurring', state.recurring);
  ensureRecurringGenerated(ym);
}

function findCat(id){ return state.categories.find(c=>c.id===id) || {name:'Categoria removida', icon:'🔖', color:'#6D6E68'}; }
function catsFor(type){ return state.categories.filter(c=>c.type===type); }

function txForMonth(d){
  const ym = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
  return state.transactions.filter(t=>t.date.slice(0,7)===ym).sort((a,b)=> b.date.localeCompare(a.date));
}
function monthTotals(list){
  let income=0, expense=0;
  list.forEach(t=> t.type==='income' ? income+=t.value : expense+=t.value);
  return {income, expense, balance: income-expense};
}
function destinoTotals(list){
  const r = {fixa:0, variavel:0, reserva:0};
  list.filter(t=>t.type==='expense').forEach(t=>{ r[t.destino||'variavel'] += t.value; });
  return r;
}
function categoryBreakdown(list){
  const map = {};
  list.filter(t=>t.type==='expense').forEach(t=>{ map[t.categoryId] = (map[t.categoryId]||0) + t.value; });
  const total = Object.values(map).reduce((a,b)=>a+b,0);
  return Object.entries(map).map(([id,val])=>{ const c=findCat(id); return {...c, value:val, pct: total? (val/total*100):0}; }).sort((a,b)=>b.value-a.value);
}

function txForYear(year){
  return state.transactions.filter(t=>t.date.slice(0,4)===String(year)).sort((a,b)=> b.date.localeCompare(a.date));
}
function monthlyBars(year){
  return Array.from({length:12},(_,m)=>{
    const key = year+'-'+String(m+1).padStart(2,'0');
    const list = state.transactions.filter(t=>t.date.slice(0,7)===key);
    const inc = list.filter(t=>t.type==='income').reduce((a,t)=>a+t.value,0);
    const exp = list.filter(t=>t.type==='expense').reduce((a,t)=>a+t.value,0);
    return {m, inc, exp};
  });
}

  app.innerHTML = `
    <div class="topbar"><h1>Controle Financeiro</h1><span class="stamp">R$</span></div>

function ruleRow(label, key, gasto, limite){
  const pct = limite>0 ? Math.min(100, (gasto/limite*100)) : 0;
  return `<div class="rule-row ${key}">
    <div class="rule-top"><span class="name">${label}</span><span class="pct">${limite>0?pct.toFixed(0):0}%</span></div>
    <div class="rule-track"><div class="rule-fill" style="width:${pct}%"></div></div>
    <div class="rule-nums"><span>Gasto: ${fmtMoney(gasto)}</span><span>Limite: ${fmtMoney(limite)}</span></div>
  </div>`;
}
function resumoCard(label, key, val, renda){
  const pct = renda>0 ? (val/renda*100) : 0;
  return `<div class="resumo-card ${key}"><div class="lbl">${label}</div><div class="pct">${pct.toFixed(0)}%</div><div class="val">${fmtMoney(val)}</div></div>`;
}
function donutGradient(breakdown){
  let acc = 0;
  return breakdown.map(c=>{ const start=acc; acc+=c.pct; return `${c.color} ${start}% ${acc}%`; }).join(', ') || 'var(--bg-card-2) 0% 100%';
}

  const groups = {}; list.forEach(t=>{ (groups[t.date]=groups[t.date]||[]).push(t); });
  const dayKeys = Object.keys(groups).sort((a,b)=>b.localeCompare(a));
  const destLabel = {fixa:'Fixa', variavel:'Variável', reserva:'Reserva'};
  return `<div class="receipt">
    ${dayKeys.map(day=>{
      const d = new Date(day+'T12:00:00');
      const label = `${DIAS_SEMANA[d.getDay()]}, ${d.getDate()} de ${MESES[d.getMonth()]}`;
      return `<div class="day-group"><div class="day-label">${label}</div>

            <div class="tx-info">

        }).join('')}
      </div>`;
    }).join('')}
  </div>`;
}

        ${expenseCats.map(c=>`<div class="catrow">
          <div class="dot" style="background:${c.color}30;">${c.icon}</div>
          <div class="cname">${escapeHtml(c.name)}</div>
          <div class="cat-amount expense">${fmtMoney(c.amount)}</div>
          <button class="del" onclick="deleteCategory('${c.id}')">✕</button>
        </div>`).join('')}
      </div>` : ''}

      ${incomeCats.length ? `
      <div class="cat-subhead">Receitas</div>
      <div class="catlist">
        ${incomeCats.map(c=>`<div class="catrow">
          <div class="dot" style="background:${c.color}30;">${c.icon}</div>
          <div class="cname">${escapeHtml(c.name)}</div>
          <div class="cat-amount income">${fmtMoney(c.amount)}</div>
          <button class="del" onclick="deleteCategory('${c.id}')">✕</button>
        </div>`).join('')}
      </div>` : ''}

      ${!state.categories.length ? `<div class="empty"><strong>Nenhuma categoria ainda</strong>crie a primeira categoria acima</div>` : ''}

      <div class="section-head" style="margin-top:26px;"><h2>Backup dos dados</h2></div>
      <div class="newcat-box">
        <p style="font-size:12.5px; color:var(--ink-soft); margin:0 0 14px; line-height:1.5;">
          Seus dados ficam salvos neste navegador. Exporte um backup de vez em quando e guarde em algum lugar seguro (Google Drive, por exemplo) — assim você não perde o histórico se trocar de celular ou limpar os dados do navegador.
        </p>
        <button class="save-btn" onclick="exportBackup()">Exportar backup</button>
        <label class="save-btn" style="display:block; text-align:center; background:var(--bg-card-2); color:var(--ink); border:1.5px solid var(--line-strong); margin-top:10px; cursor:pointer;">
          Importar backup
          <input type="file" accept="application/json" onchange="importBackup(this.files[0])" style="display:none;">
        </label>
      </div>
    </div>
  `;
}
function setNewCatType(t){ newCatType=t; render(); }
function pickCatIcon(i){ newCatIcon=i; render(); }
function pickCatColor(c){ newCatColor=c; render(); }
async function saveCategory(){
  const name = (document.getElementById('cat-name').value||'').trim();
  if(!name){ shake('cat-name'); return; }
  state.categories.push({ id:uid(), name, color:newCatColor, icon:newCatIcon, type:newCatType });
  await saveKey('categories', state.categories);
  newCatName=''; newCatColor=CAT_COLORS[0]; newCatIcon=ICONS[0]; newCatType='expense';
  render();
}
async function deleteCategory(id){
  state.categories = state.categories.filter(c=>c.id!==id);
  await saveKey('categories', state.categories);
  render();
}

/* ---------- Backup ---------- */
function exportBackup(){
  const payload = {
    app: 'controle-financeiro', version: 1, exportedAt: new Date().toISOString(),
    transactions: state.transactions, cards: state.cards, goals: state.goals,
    recurring: state.recurring, categories: state.categories,
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().slice(0,10);
  a.href = url; a.download = `controle-financeiro-backup-${stamp}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function importBackup(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    let data;
    try{
      data = JSON.parse(reader.result);
      if(!data || typeof data !== 'object') throw new Error('formato inválido');
    } catch(e){
      showToast('Não foi possível ler esse arquivo de backup.');
      return;
    }
    askConfirm('Isso vai substituir todos os dados atuais deste navegador pelos dados do backup. Continuar?', async ()=>{
      state.transactions = Array.isArray(data.transactions) ? data.transactions : [];
      state.cards = Array.isArray(data.cards) ? data.cards : [];
      state.goals = Array.isArray(data.goals) ? data.goals : [];
      state.recurring = Array.isArray(data.recurring) ? data.recurring : [];
      state.categories = Array.isArray(data.categories) && data.categories.length ? data.categories : DEFAULT_CATEGORIES.slice();
      await Promise.all([
        saveKey('transactions', state.transactions), saveKey('cards', state.cards),
        saveKey('goals', state.goals), saveKey('recurring', state.recurring),
        saveKey('categories', state.categories),
      ]);
      showToast('Backup importado com sucesso.');
      render();
    });
  };
  reader.readAsText(file);
}

/* ---------- Metas (bonus, on Dashboard) ---------- */
function renderMetasSection(){
  return `
    <div class="section">
      <div class="section-head"><h2>Metas de economia</h2><button class="link" onclick="openGoalForm()">+ nova</button></div>
      ${state.goals.length ? state.goals.map(g=>{
        const pct = g.target? Math.min(100,(g.saved/g.target*100)) : 0;
        return `<div class="goal-card">
          <div class="goal-top"><span class="name">${escapeHtml(g.name)}</span><button class="del" onclick="deleteGoal('${g.id}')">✕</button></div>
          <div class="goal-nums"><span>${fmtMoney(g.saved)}</span><span>${fmtMoney(g.target)}</span></div>
          <div class="goal-bar-track"><div class="goal-bar-fill" style="width:${pct}%"></div></div>
          <div class="goal-add"><input type="text" inputmode="decimal" placeholder="Valor do aporte" id="goal-input-${g.id}"><button onclick="contributeGoal('${g.id}')">Guardar</button></div>
        </div>`;
      }).join('') : `<div class="empty"><strong>Nenhuma meta ainda</strong>crie uma meta para acompanhar sua economia</div>`}
    </div>
  `;
}

/* ---------- sheet: add transaction / card / goal ---------- */
function openSheet(){
  state.sheetMode='tx';
  state.editingTxId = null;
  const presetType = state.tab==='receitas' ? 'income' : 'expense';
  state.form = { type:presetType, value:'', categoryId:null, destino:'fixa', date: todayISO(), cardId:'', recurring:false, recurringMonths:'', note:'' };
  state.sheetOpen = true; render();
}
function editTx(id){
  const t = state.transactions.find(t=>t.id===id);
  if(!t) return;
  state.sheetMode='tx';
  state.editingTxId = id;
  state.form = {
    type: t.type, value: (t.value||0).toFixed(2).replace('.',','), categoryId: t.categoryId,
    destino: t.destino || 'fixa', date: t.date, cardId: t.cardId||'', recurring:false, recurringMonths:'', note: t.note||''
  };
  state.sheetOpen = true; render();
}
function openCardForm(){ state.sheetMode='card'; state.sheetOpen=true; render(); }
function openGoalForm(){ state.sheetMode='goal'; state.sheetOpen=true; render(); }
function closeSheet(){ state.sheetOpen=false; state.editingTxId=null; render(); }

function renderSheet(){
  if(!state.sheetOpen) return `<div class="overlay"></div>`;
  let inner='';
  if(state.sheetMode==='tx') inner = renderTxForm();
  else if(state.sheetMode==='card') inner = renderCardForm();
  else if(state.sheetMode==='goal') inner = renderGoalFormSheet();
  return `<div class="overlay open" id="overlay"><div class="sheet" onclick="event.stopPropagation()"><div class="sheet-handle"></div>${inner}</div></div>`;
}
function attachSheetEvents(){ const ov=document.getElementById('overlay'); if(ov) ov.addEventListener('click', closeSheet); }

function renderTxForm(){
  const f = state.form;
  const editing = !!state.editingTxId;
  const editingTx = editing ? state.transactions.find(t=>t.id===state.editingTxId) : null;
  const cats = catsFor(f.type);
  if(!f.categoryId || !cats.find(c=>c.id===f.categoryId)) f.categoryId = cats[0] ? cats[0].id : null;
  return `
    <h3>${editing ? 'Editar lançamento' : 'Novo lançamento'}</h3>
    <div class="segmented">
      <button class="${f.type==='expense'?'active expense':''}" onclick="setFormType('expense')">Despesa</button>
      <button class="${f.type==='income'?'active income':''}" onclick="setFormType('income')">Receita</button>
    </div>
    <div class="field"><label>Valor</label>
      <div class="valinput-wrap"><span>R$</span><input type="text" inputmode="decimal" id="f-value" placeholder="0,00" value="${f.value}" oninput="state.form.value=this.value"></div>
    </div>
    <div class="field"><label>Categoria</label>
      <div class="chipgrid">
        ${cats.length ? cats.map(c=>`<button class="chip ${f.categoryId===c.id?'selected':''}" onclick="setFormCat('${c.id}')">${c.icon} ${escapeHtml(c.name)}</button>`).join('') : `<span style="font-size:12px;color:var(--ink-soft)">Nenhuma categoria de ${f.type==='income'?'receita':'despesa'} ainda. Crie uma na aba Categorias.</span>`}
      </div>
    </div>
    ${f.type==='expense' ? `
    <div class="field"><label>Tipo de gasto</label>
      <div class="segmented">
        <button class="${f.destino==='fixa'?'active fixa':''}" onclick="setFormDestino('fixa')">Fixa</button>
        <button class="${f.destino==='variavel'?'active variavel':''}" onclick="setFormDestino('variavel')">Variável</button>
        <button class="${f.destino==='reserva'?'active reserva':''}" onclick="setFormDestino('reserva')">Reserva</button>
      </div>
    </div>` : ''}
    <div class="field"><label>Data</label><input type="date" id="f-date" value="${f.date}" oninput="state.form.date=this.value"></div>
    ${f.type==='expense' ? `
    <div class="field"><label>Cartão (opcional)</label>
      ${state.cards.length ? `
      <select id="f-card" onchange="state.form.cardId=this.value">
        <option value="">Nenhum</option>
        ${state.cards.map(c=>`<option value="${c.id}" ${f.cardId===c.id?'selected':''}>${escapeHtml(c.name)}</option>`).join('')}
      </select>` : `
      <div style="font-size:12px; color:var(--ink-soft); background:var(--bg-card); border:1px dashed var(--line-strong); border-radius:12px; padding:12px;">
        Nenhum cartão cadastrado ainda. <button type="button" style="background:none;border:none;color:var(--gold);font-weight:600;padding:0;font-size:12px;" onclick="goToCardsTab()">Cadastrar um cartão</button>
      </div>`}
    </div>` : ''}
    <div class="field"><label>Nota (opcional)</label><input type="text" id="f-note" placeholder="ex: mercado do mês" value="${escapeHtml(f.note)}" oninput="state.form.note=this.value"></div>
    ${editing ? (editingTx && editingTx.recurringId ? `<div style="font-size:11.5px; color:var(--ink-soft); margin-bottom:10px;">🔁 Este lançamento faz parte de uma despesa recorrente. Editar aqui altera só esta ocorrência.</div>` : '') : `
    <div class="field toggle-row"><span class="t-label">Repete todo mês</span><button class="switch ${f.recurring?'on':''}" onclick="toggleRecurring()"></button></div>
    ${f.recurring ? `
    <div class="field">
      <label>Repetir por quantos meses</label>
      <input type="text" inputmode="numeric" id="f-recurring-months" placeholder="Deixe vazio para repetir sempre" value="${f.recurringMonths}" oninput="state.form.recurringMonths=this.value">
    </div>` : ''}`}
    <button class="save-btn" onclick="saveTx()" ${!f.categoryId?'disabled style="opacity:.5"':''}>${editing ? 'Salvar edição' : 'Salvar lançamento'}</button>
    <button class="cancel-link" onclick="closeSheet()">Cancelar</button>
  `;
}
function goToCardsTab(){ state.sheetOpen=false; state.tab='cartoes'; render(); }
function setFormType(t){ state.form.type=t; state.form.categoryId=null; render(); }
function setFormCat(id){ state.form.categoryId=id; render(); }
function setFormDestino(d){ state.form.destino=d; render(); }
function toggleRecurring(){ state.form.recurring=!state.form.recurring; render(); }

async function saveTx(){
  const f = state.form;
  if(!f.categoryId) return;
  const value = parseFloat((f.value||'0').toString().replace(/\./g,'').replace(',','.'));
  if(!value || value<=0){ shake('f-value'); return; }

  if(state.editingTxId){
    const idx = state.transactions.findIndex(t=>t.id===state.editingTxId);
    if(idx>-1){
      const existing = state.transactions[idx];
      state.transactions[idx] = { ...existing, type:f.type, value, categoryId:f.categoryId,
        destino: f.type==='expense' ? f.destino : undefined,
        date:f.date||todayISO(), cardId: f.type==='expense' ? (f.cardId||'') : '', note:f.note||'' };
      await saveKey('transactions', state.transactions);
    }
    state.editingTxId = null; state.sheetOpen=false; render();
    return;
  }

  const tx = { id:uid(), type:f.type, value, categoryId:f.categoryId, destino: f.type==='expense' ? f.destino : undefined,
    date:f.date||todayISO(), cardId: f.type==='expense' ? (f.cardId||'') : '', note:f.note||'' };
  if(f.recurring){
    const recId = uid(); tx.recurringId = recId;
    const months = parseInt(f.recurringMonths);
    state.recurring.push({ id:recId, type:f.type, value, categoryId:f.categoryId, destino:tx.destino, note:f.note||'', day:Number((f.date||todayISO()).slice(8,10)), cardId:tx.cardId, active:true, startYm:(f.date||todayISO()).slice(0,7), totalMonths:(months && months>0) ? months : null });
    await saveKey('recurring', state.recurring);
  }
  state.transactions.push(tx);
  await saveKey('transactions', state.transactions);
  state.sheetOpen=false; render();
}
function shake(id){ const el=document.getElementById(id); if(el){ el.style.borderColor='var(--rust)'; setTimeout(()=>{el.style.borderColor='';},900);} }
function deleteTx(id){
  const t = state.transactions.find(t=>t.id===id);
  if(!t) return;
  if(t.recurringId){
    askOptions('Este lançamento faz parte de uma despesa recorrente. O que deseja fazer?', [
      { label:'Excluir só este mês', danger:true, onClick: async ()=>{
          const r = state.recurring.find(r=>r.id===t.recurringId);
          if(r){ r.skippedYms = r.skippedYms||[]; if(!r.skippedYms.includes(t.date.slice(0,7))) r.skippedYms.push(t.date.slice(0,7)); await saveKey('recurring', state.recurring); }
          state.transactions = state.transactions.filter(x=>x.id!==id);
          await saveKey('transactions', state.transactions);
        } },
      { label:'Excluir e parar a repetição', danger:true, onClick: async ()=>{
          const r = state.recurring.find(r=>r.id===t.recurringId);
          if(r){ r.active = false; await saveKey('recurring', state.recurring); }
          state.transactions = state.transactions.filter(x=>x.id!==id);
          await saveKey('transactions', state.transactions);
        } },
    ]);
  } else {
    askConfirm('Excluir este lançamento? Essa ação não pode ser desfeita.', async ()=>{
      state.transactions = state.transactions.filter(t=>t.id!==id);
      await saveKey('transactions', state.transactions);
    });
  }
}

const cardColors = ['#1F3D2B','#2F6B4F','#AE4430','#4F5D75','#7A4F9E','#B9902B'];
let newCardColor = cardColors[0];
function renderCardForm(){
  return `
    <h3>Novo cartão</h3>
    <div class="field"><label>Apelido</label><input type="text" id="c-name" placeholder="ex: Nubank"></div>
    <div class="field"><label>Cor</label><div class="chipgrid">${cardColors.map(c=>`<button class="chip ${newCardColor===c?'selected':''}" style="background:${c}30" onclick="pickCardColor('${c}')">●</button>`).join('')}</div></div>
    <div class="field"><label>Limite</label><div class="valinput-wrap"><span>R$</span><input type="text" inputmode="decimal" id="c-limit" placeholder="0,00"></div></div>
    <div class="field"><label>Dia de fechamento</label><input type="text" inputmode="numeric" id="c-close" placeholder="ex: 20"></div>
    <div class="field"><label>Dia de vencimento</label><input type="text" inputmode="numeric" id="c-due" placeholder="ex: 27"></div>
    <button class="save-btn" onclick="saveCard()">Salvar cartão</button>
    <button class="cancel-link" onclick="closeSheet()">Cancelar</button>
  `;
}
function pickCardColor(c){ newCardColor=c; render(); }
async function saveCard(){
  const name=(document.getElementById('c-name').value||'').trim();
  if(!name){ shake('c-name'); return; }
  const limit = parseFloat((document.getElementById('c-limit').value||'0').replace(/\./g,'').replace(',','.'))||0;
  const closingDay = parseInt(document.getElementById('c-close').value)||1;
  const dueDay = parseInt(document.getElementById('c-due').value)||10;
  state.cards.push({ id:uid(), name, color:newCardColor, limit, closingDay, dueDay });
  await saveKey('cards', state.cards);
  newCardColor=cardColors[0]; state.sheetOpen=false; render();
}
async function deleteCard(id){ state.cards = state.cards.filter(c=>c.id!==id); await saveKey('cards', state.cards); render(); }

function renderGoalFormSheet(){
  return `
    <h3>Nova meta</h3>
    <div class="field"><label>Nome da meta</label><input type="text" id="g-name" placeholder="ex: Viagem, Reserva de emergência"></div>
    <div class="field"><label>Valor alvo</label><div class="valinput-wrap"><span>R$</span><input type="text" inputmode="decimal" id="g-target" placeholder="0,00"></div></div>
    <button class="save-btn" onclick="saveGoal()">Criar meta</button>
    <button class="cancel-link" onclick="closeSheet()">Cancelar</button>
  `;
}
async function saveGoal(){
  const name=(document.getElementById('g-name').value||'').trim();
  const target = parseFloat((document.getElementById('g-target').value||'0').replace(/\./g,'').replace(',','.'));
  if(!name || !target){ shake(name?'g-target':'g-name'); return; }
  state.goals.push({ id:uid(), name, target, saved:0 });
  await saveKey('goals', state.goals);
  state.sheetOpen=false; render();
}
async function deleteGoal(id){ state.goals = state.goals.filter(g=>g.id!==id); await saveKey('goals', state.goals); render(); }
async function contributeGoal(id){
  const input = document.getElementById('goal-input-'+id);
  const v = parseFloat((input.value||'0').replace(/\./g,'').replace(',','.'));
  if(!v || v<=0){ shake('goal-input-'+id); return; }
  const g = state.goals.find(g=>g.id===id); g.saved += v;
  await saveKey('goals', state.goals); render();
}

init();
</script>
